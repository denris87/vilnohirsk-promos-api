# =====================================================================
#  ЯК ДОДАВАТИ АКЦІЇ
# =====================================================================
#  Кожна акція починається з "- shop:". Скопіюй приклад нижче,
#  встав ЗВЕРХУ списку (одразу під "promos:") і зміни значення.
#
#  Обов'язкове ЛИШЕ поле shop. Усі інші — за бажанням:
#  чого не вкажеш — те підставиться саме (порожньо / показати).
#
#  ПОЛЯ:
#    shop        назва магазину або акції           (обов'язково)
#    title       заголовок
#    discount    напис знижки: "-30%", "1+1=3", "До 24 платежів"
#    validUntil  до коли діє: "31.12.2026" або "Безстроково"
#    phone       телефон
#    link        посилання на сайт: "https://assol.in.ua"
#    photo       ОДНЕ фото (посилання)
#    photos      КІЛЬКА фото — списком (кожне з "- ")
#    description текст. Короткий — в один рядок. Довгий — постав "|"
#                і пиши рядки з відступом 6 пробілів (emoji можна).
#    vip         true — позначка VIP
#    active      false — чернетка (схована). Не вказано → опублікована.
#
#  СВОЄ ФОТО: залий картинку в репозиторій (кнопка "Add file") і встав:
#    https://github.com/denris87/vilnohirsk-promos-api/blob/main/ІМ'Я_ФАЙЛУ?raw=true
# =====================================================================

